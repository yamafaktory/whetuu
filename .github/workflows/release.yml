name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  ZIG_VERSION: 0.17.0-dev.1422+e863bf3be

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      # A tag must never publish a binary whose tests never ran.
      - run: zig build test

      # The target list lives in build.zig so it cannot drift from CI.
      - name: Build artifacts
        run: zig build release -Dversion="${{ github.ref_name }}"

      - name: Checksum
        run: (cd zig-out/release && sha256sum ./*.tar.gz > SHA256SUMS)

      # A semver pre-release suffix (v1.2.3-rc.1) must not be published as the
      # latest stable release — that is what the install docs point people at.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          case "$VERSION" in
            *-*) prerelease=--prerelease ;;
            *)   prerelease= ;;
          esac
          gh release create "$VERSION" zig-out/release/* \
            --title "$VERSION" \
            --generate-notes \
            ${prerelease:+"$prerelease"}
