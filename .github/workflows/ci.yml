name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.17.0-dev.1422+e863bf3be

jobs:
  test:
    name: Format, check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig fmt --check src build.zig
      - run: zig build check
      - run: zig build test

  cross-compile:
    # Guards against reintroducing a Linux-only syscall (std.os.linux.*) that
    # compiles natively but breaks the macOS builds.
    name: Cross-compile release targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build release
